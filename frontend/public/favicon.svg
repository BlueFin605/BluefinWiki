<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e3a5f"/>

  <!-- Open book / wiki pages -->
  <path d="M12 42 L32 38 L32 20 L12 24 Z" fill="#e8eef4" opacity="0.95"/>
  <path d="M52 42 L32 38 L32 20 L52 24 Z" fill="#d0dce8" opacity="0.95"/>
  <!-- Book spine -->
  <line x1="32" y1="20" x2="32" y2="38" stroke="#1e3a5f" stroke-width="0.8"/>
  <!-- Page lines left -->
  <line x1="16" y1="27" x2="29" y2="24" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="30.5" x2="29" y2="27.5" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="29" y2="31" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Page lines right -->
  <line x1="48" y1="27" x2="35" y2="24" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="48" y1="30.5" x2="35" y2="27.5" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="48" y1="34" x2="35" y2="31" stroke="#8ea8c3" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Bluefin dorsal fin rising from the book -->
  <path d="M32 22 C32 22, 28 12, 30 8 C31 5, 33 5, 34 8 C36 12, 32 22, 32 22 Z" fill="#2980b9"/>
  <path d="M32 22 C32 22, 30 14, 31 9 C31.5 6.5, 32 10, 32 22 Z" fill="#3498db" opacity="0.6"/>
  <!-- Fin detail lines -->
  <path d="M31.2 18 C31 15, 30.5 12, 31 9.5" stroke="#1a5276" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M32.8 18 C33 15, 33.5 12.5, 33.2 9.5" stroke="#1a5276" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Small water ripple at base of fin -->
  <ellipse cx="32" cy="21.5" rx="5" ry="1" fill="#5dade2" opacity="0.3"/>

  <!-- Subtle ring around circle -->
  <circle cx="32" cy="32" r="30" stroke="#2980b9" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
