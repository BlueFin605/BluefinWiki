name: Backend CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      CI: true

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install production dependencies into dist
        run: |
          # Copy package files but remove "type": "module" so Lambda loads .js as CommonJS
          node -e "const p=require('./package.json'); delete p.type; delete p.scripts; delete p.devDependencies; require('fs').writeFileSync('dist/package.json', JSON.stringify(p, null, 2))"
          cp ../package-lock.json dist/
          cd dist && npm ci --omit=dev

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7
