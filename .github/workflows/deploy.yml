name: Deploy

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  DEPLOY_ENVIRONMENT: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact from Backend CI
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: backend.yml
          workflow_conclusion: success
          branch: ${{ github.ref_name }}
          name: backend-build
          path: backend/dist
          if_no_artifact_found: fail

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFront Distribution ID
        id: distribution
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          echo "distribution_id=${DISTRIBUTION_ID}" >> $GITHUB_OUTPUT
          echo "bucket_name=bluefinwiki-frontend-${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_OUTPUT

      - name: Get frontend build configuration
        id: frontend_config
        run: |
          API_BASE_URL=$(aws cloudformation describe-stacks \
            --stack-name "BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name "BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text)

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name "BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebClientId'].OutputValue" \
            --output text)

          if [ -z "${API_BASE_URL}" ] || [ "${API_BASE_URL}" = "None" ]; then
            echo "ApiUrl output not found" >&2
            exit 1
          fi

          if [ -z "${COGNITO_USER_POOL_ID}" ] || [ "${COGNITO_USER_POOL_ID}" = "None" ]; then
            echo "UserPoolId output not found" >&2
            exit 1
          fi

          if [ -z "${COGNITO_CLIENT_ID}" ] || [ "${COGNITO_CLIENT_ID}" = "None" ]; then
            echo "WebClientId output not found" >&2
            exit 1
          fi

          COGNITO_DOMAIN_VALUE=$(aws cognito-idp describe-user-pool \
            --user-pool-id "${COGNITO_USER_POOL_ID}" \
            --query "UserPool.Domain" \
            --output text)

          if [ -z "${COGNITO_DOMAIN_VALUE}" ] || [ "${COGNITO_DOMAIN_VALUE}" = "None" ]; then
            echo "Cognito Hosted UI domain is not configured on the user pool" >&2
            exit 1
          fi

          case "${COGNITO_DOMAIN_VALUE}" in
            *.*)
              COGNITO_DOMAIN="${COGNITO_DOMAIN_VALUE}"
              ;;
            *)
              COGNITO_DOMAIN="${COGNITO_DOMAIN_VALUE}.auth.${{ env.AWS_REGION }}.amazoncognito.com"
              ;;
          esac

          CALLBACK_URLS=$(aws cognito-idp describe-user-pool-client \
            --user-pool-id "${COGNITO_USER_POOL_ID}" \
            --client-id "${COGNITO_CLIENT_ID}" \
            --query "UserPoolClient.CallbackURLs" \
            --output text)

          if [ -z "${CALLBACK_URLS}" ] || [ "${CALLBACK_URLS}" = "None" ]; then
            echo "No callback URLs configured on Cognito web app client" >&2
            exit 1
          fi

          COGNITO_REDIRECT_URI=""
          for url in ${CALLBACK_URLS}; do
            if [[ "${url}" == *"/callback"* ]]; then
              COGNITO_REDIRECT_URI="${url}"
              break
            fi
          done

          if [ -z "${COGNITO_REDIRECT_URI}" ]; then
            COGNITO_REDIRECT_URI=$(echo "${CALLBACK_URLS}" | awk '{print $1}')
          fi

          if [ -z "${COGNITO_REDIRECT_URI}" ] || [ "${COGNITO_REDIRECT_URI}" = "None" ]; then
            echo "Unable to resolve VITE_COGNITO_REDIRECT_URI from Cognito app client callback URLs" >&2
            exit 1
          fi

          echo "api_base_url=${API_BASE_URL}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=${COGNITO_USER_POOL_ID}" >> $GITHUB_OUTPUT
          echo "cognito_client_id=${COGNITO_CLIENT_ID}" >> $GITHUB_OUTPUT
          echo "cognito_domain=${COGNITO_DOMAIN}" >> $GITHUB_OUTPUT
          echo "cognito_redirect_uri=${COGNITO_REDIRECT_URI}" >> $GITHUB_OUTPUT

      - name: Validate frontend auth env values
        run: |
          API_BASE_URL="${{ steps.frontend_config.outputs.api_base_url }}"
          COGNITO_USER_POOL_ID="${{ steps.frontend_config.outputs.cognito_user_pool_id }}"
          COGNITO_CLIENT_ID="${{ steps.frontend_config.outputs.cognito_client_id }}"
          COGNITO_DOMAIN="${{ steps.frontend_config.outputs.cognito_domain }}"
          COGNITO_REDIRECT_URI="${{ steps.frontend_config.outputs.cognito_redirect_uri }}"

          if [ -z "${API_BASE_URL}" ] || [ "${API_BASE_URL}" = "None" ]; then
            echo "Invalid VITE_API_BASE_URL from stack outputs" >&2
            exit 1
          fi

          if [ -z "${COGNITO_USER_POOL_ID}" ] || [ "${COGNITO_USER_POOL_ID}" = "None" ] || [ "${COGNITO_USER_POOL_ID}" = "local_abc123" ]; then
            echo "Invalid VITE_COGNITO_USER_POOL_ID from stack outputs" >&2
            exit 1
          fi

          if [ -z "${COGNITO_CLIENT_ID}" ] || [ "${COGNITO_CLIENT_ID}" = "None" ] || [ "${COGNITO_CLIENT_ID}" = "local-client-id" ]; then
            echo "Invalid VITE_COGNITO_CLIENT_ID from stack outputs" >&2
            exit 1
          fi

          if [ -z "${COGNITO_DOMAIN}" ] || [ "${COGNITO_DOMAIN}" = "None" ] || [ "${COGNITO_DOMAIN}" = "localhost:9229" ]; then
            echo "Invalid VITE_COGNITO_DOMAIN from secrets" >&2
            exit 1
          fi

          if [ -z "${COGNITO_REDIRECT_URI}" ] || [ "${COGNITO_REDIRECT_URI}" = "None" ] || [ "${COGNITO_REDIRECT_URI}" = "http://localhost:5173/callback" ]; then
            echo "Invalid VITE_COGNITO_REDIRECT_URI from secrets" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.frontend_config.outputs.api_base_url }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.frontend_config.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.frontend_config.outputs.cognito_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.frontend_config.outputs.cognito_domain }}
          VITE_COGNITO_REDIRECT_URI: ${{ steps.frontend_config.outputs.cognito_redirect_uri }}
        run: npm run build

      - name: Deploy backend Lambdas
        run: |
          ENV="${{ env.DEPLOY_ENVIRONMENT }}"
          FUNCTIONS=(
            "bluefinwiki-${ENV}-pages-create"
            "bluefinwiki-${ENV}-pages-get"
            "bluefinwiki-${ENV}-pages-update"
            "bluefinwiki-${ENV}-pages-delete"
            "bluefinwiki-${ENV}-pages-list-children"
            "bluefinwiki-${ENV}-pages-move"
            "bluefinwiki-${ENV}-pages-search"
            "bluefinwiki-${ENV}-pages-backlinks"
            "bluefinwiki-${ENV}-pages-attachments-upload"
            "bluefinwiki-${ENV}-pages-attachments-presign"
            "bluefinwiki-${ENV}-pages-attachments-confirm"
            "bluefinwiki-${ENV}-pages-attachments-download"
            "bluefinwiki-${ENV}-pages-attachments-list"
            "bluefinwiki-${ENV}-pages-attachments-delete"
            "bluefinwiki-${ENV}-auth-pre-signup"
            "bluefinwiki-${ENV}-auth-post-confirmation"
            "bluefinwiki-${ENV}-auth-pre-token-gen"
            "bluefinwiki-${ENV}-auth-custom-message"
            "bluefinwiki-${ENV}-tags-create"
            "bluefinwiki-${ENV}-tags-list"
            "bluefinwiki-${ENV}-page-types-list"
            "bluefinwiki-${ENV}-page-types-get"
            "bluefinwiki-${ENV}-page-types-create"
            "bluefinwiki-${ENV}-page-types-update"
            "bluefinwiki-${ENV}-page-types-delete"
            "bluefinwiki-${ENV}-page-types-allowed-children"
          )

          # Package the backend dist into a zip
          cd backend/dist
          zip -r ../../backend-lambda.zip .
          cd ../..

          FAILED=0
          for FUNC in "${FUNCTIONS[@]}"; do
            echo "Deploying ${FUNC}..."
            OUTPUT=$(aws lambda update-function-code \
              --function-name "${FUNC}" \
              --zip-file fileb://backend-lambda.zip \
              --publish 2>&1) && {
              echo "  ✓ ${FUNC}"
            } || {
              echo "  ✗ ${FUNC} - FAILED"
              echo "    ${OUTPUT}"
              FAILED=1
            }
          done

          rm backend-lambda.zip

          if [ "${FAILED}" -eq 1 ]; then
            echo "One or more Lambda deployments failed"
            exit 1
          fi

      - name: Deploy frontend to S3
        env:
          S3_BUCKET: ${{ steps.distribution.outputs.bucket_name }}
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html" \
            --exclude "*.js.map" \
            --exclude "*.css.map"

          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.distribution.outputs.distribution_id }}
        run: |
          if [ -z "${DISTRIBUTION_ID}" ] || [ "${DISTRIBUTION_ID}" = "None" ]; then
            echo "CloudFront Distribution ID not found. Skipping cache invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Output deployment info
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ steps.distribution.outputs.bucket_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution ID:** ${{ steps.distribution.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lambda Functions:** 12 (bluefinwiki-${{ env.DEPLOY_ENVIRONMENT }}-pages-*)" >> $GITHUB_STEP_SUMMARY