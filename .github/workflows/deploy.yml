name: Deploy

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  DEPLOY_ENVIRONMENT: production

jobs:
  # =========================================================================
  # Phase 1: Resolve production config from AWS (needed for frontend build)
  # =========================================================================
  resolve-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api_base_url: ${{ steps.config.outputs.api_base_url }}
      cognito_user_pool_id: ${{ steps.config.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ steps.config.outputs.cognito_client_id }}
      cognito_domain: ${{ steps.config.outputs.cognito_domain }}
      cognito_redirect_uri: ${{ steps.config.outputs.cognito_redirect_uri }}
      s3_bucket: ${{ steps.config.outputs.s3_bucket }}
      distribution_id: ${{ steps.config.outputs.distribution_id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs and Cognito config
        id: config
        run: |
          STACK="BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}"

          API_BASE_URL=$(aws cloudformation describe-stacks --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)

          COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebClientId'].OutputValue" --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)

          # Resolve Cognito domain
          COGNITO_DOMAIN_VALUE=$(aws cognito-idp describe-user-pool \
            --user-pool-id "${COGNITO_USER_POOL_ID}" \
            --query "UserPool.Domain" --output text)

          case "${COGNITO_DOMAIN_VALUE}" in
            *.*) COGNITO_DOMAIN="${COGNITO_DOMAIN_VALUE}" ;;
            *)   COGNITO_DOMAIN="${COGNITO_DOMAIN_VALUE}.auth.${{ env.AWS_REGION }}.amazoncognito.com" ;;
          esac

          # Resolve redirect URI from Cognito client callback URLs
          CALLBACK_URLS=$(aws cognito-idp describe-user-pool-client \
            --user-pool-id "${COGNITO_USER_POOL_ID}" \
            --client-id "${COGNITO_CLIENT_ID}" \
            --query "UserPoolClient.CallbackURLs" --output text)

          COGNITO_REDIRECT_URI=""
          for url in ${CALLBACK_URLS}; do
            if [[ "${url}" == *"/callback"* ]]; then
              COGNITO_REDIRECT_URI="${url}"
              break
            fi
          done
          if [ -z "${COGNITO_REDIRECT_URI}" ]; then
            COGNITO_REDIRECT_URI=$(echo "${CALLBACK_URLS}" | awk '{print $1}')
          fi

          # Validate
          for var in API_BASE_URL COGNITO_USER_POOL_ID COGNITO_CLIENT_ID COGNITO_DOMAIN COGNITO_REDIRECT_URI; do
            val="${!var}"
            if [ -z "${val}" ] || [ "${val}" = "None" ]; then
              echo "::error::${var} could not be resolved from AWS" && exit 1
            fi
          done

          echo "api_base_url=${API_BASE_URL}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=${COGNITO_USER_POOL_ID}" >> $GITHUB_OUTPUT
          echo "cognito_client_id=${COGNITO_CLIENT_ID}" >> $GITHUB_OUTPUT
          echo "cognito_domain=${COGNITO_DOMAIN}" >> $GITHUB_OUTPUT
          echo "cognito_redirect_uri=${COGNITO_REDIRECT_URI}" >> $GITHUB_OUTPUT
          echo "s3_bucket=bluefinwiki-frontend-${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_OUTPUT
          echo "distribution_id=${DISTRIBUTION_ID}" >> $GITHUB_OUTPUT

  # =========================================================================
  # Phase 2: Build backend and frontend in parallel
  # =========================================================================
  build-backend:
    uses: ./.github/workflows/backend.yml

  build-frontend:
    needs: resolve-config
    uses: ./.github/workflows/frontend.yml
    with:
      api_base_url: ${{ needs.resolve-config.outputs.api_base_url }}
      cognito_region: ap-southeast-2
      cognito_user_pool_id: ${{ needs.resolve-config.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ needs.resolve-config.outputs.cognito_client_id }}
      cognito_domain: ${{ needs.resolve-config.outputs.cognito_domain }}
      cognito_redirect_uri: ${{ needs.resolve-config.outputs.cognito_redirect_uri }}

  # =========================================================================
  # Phase 3: Deploy artifacts to AWS
  # =========================================================================
  deploy:
    needs: [resolve-config, build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend Lambdas
        run: |
          ENV="${{ env.DEPLOY_ENVIRONMENT }}"

          # Discover all Lambda functions belonging to this stack
          FUNCTIONS=$(aws lambda list-functions \
            --query "Functions[?starts_with(FunctionName, 'bluefinwiki-${ENV}-')].FunctionName" \
            --output text)

          if [ -z "${FUNCTIONS}" ]; then
            echo "::error::No Lambda functions found with prefix bluefinwiki-${ENV}-"
            exit 1
          fi

          # Package the backend dist into a zip
          cd backend/dist
          zip -r ../../backend-lambda.zip .
          cd ../..

          FAILED=0
          COUNT=0
          for FUNC in ${FUNCTIONS}; do
            echo "Deploying ${FUNC}..."
            OUTPUT=$(aws lambda update-function-code \
              --function-name "${FUNC}" \
              --zip-file fileb://backend-lambda.zip \
              --publish 2>&1) && {
              echo "  ✓ ${FUNC}"
              COUNT=$((COUNT + 1))
            } || {
              echo "  ✗ ${FUNC} - FAILED"
              echo "    ${OUTPUT}"
              FAILED=1
            }
          done

          rm backend-lambda.zip

          echo "Deployed ${COUNT} Lambda functions"
          if [ "${FAILED}" -eq 1 ]; then
            echo "::error::One or more Lambda deployments failed"
            exit 1
          fi

      - name: Deploy frontend to S3
        env:
          S3_BUCKET: ${{ needs.resolve-config.outputs.s3_bucket }}
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html" \
            --exclude "*.js.map" \
            --exclude "*.css.map"

          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ needs.resolve-config.outputs.distribution_id }}
        run: |
          if [ -z "${DISTRIBUTION_ID}" ] || [ "${DISTRIBUTION_ID}" = "None" ]; then
            echo "CloudFront Distribution ID not found. Skipping cache invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Output deployment info
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**API:** ${{ needs.resolve-config.outputs.api_base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ needs.resolve-config.outputs.s3_bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution ID:** ${{ needs.resolve-config.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
