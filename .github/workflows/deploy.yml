name: Deploy

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  DEPLOY_ENVIRONMENT: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact from Backend CI
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: backend.yml
          workflow_conclusion: success
          branch: ${{ github.ref_name }}
          name: backend-build
          path: backend/dist
          if_no_artifact_found: fail

      - name: Download frontend artifact from Frontend CI
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: frontend.yml
          workflow_conclusion: success
          branch: ${{ github.ref_name }}
          name: frontend-build
          path: frontend/dist
          if_no_artifact_found: fail

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFront Distribution ID
        id: distribution
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "BlueFinWiki-${{ env.DEPLOY_ENVIRONMENT }}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          echo "distribution_id=${DISTRIBUTION_ID}" >> $GITHUB_OUTPUT
          echo "bucket_name=bluefinwiki-frontend-${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        env:
          S3_BUCKET: ${{ steps.distribution.outputs.bucket_name }}
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html" \
            --exclude "*.js.map" \
            --exclude "*.css.map"

          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.distribution.outputs.distribution_id }}
        run: |
          if [ -z "${DISTRIBUTION_ID}" ] || [ "${DISTRIBUTION_ID}" = "None" ]; then
            echo "CloudFront Distribution ID not found. Skipping cache invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Output deployment info
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.DEPLOY_ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ steps.distribution.outputs.bucket_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution ID:** ${{ steps.distribution.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY